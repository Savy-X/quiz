*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:#e84040; --blue:#1468c8; --green:#1aaa6e; --orange:#e07b10;
  --red-d:#a82e2e; --blue-d:#0d4a96; --green-d:#0e7a4e; --orange-d:#a35808;
  --bg:#1a0e3d; --gold:#f5c842; --gold-d:#b89000;

}
body { font-family:'Nunito Sans',sans-serif; background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; color:#fff; }
#app { width:100%; max-width:700px; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation:fadeUp 0.35s ease; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
.yellow-btn { background:var(--gold); color:#1a0e3d; border:none; padding:0.9rem 2rem; font-family:'Nunito',sans-serif; font-weight:900; font-size:1rem; border-radius:12px; cursor:pointer; box-shadow:0 4px 0 var(--gold-d); transition:transform 0.12s,box-shadow 0.12s; width:100%; }
.yellow-btn:hover { transform:translateY(-2px); box-shadow:0 6px 0 var(--gold-d); }
.yellow-btn:active { transform:translateY(1px); box-shadow:0 2px 0 var(--gold-d); }
.yellow-btn:disabled { opacity:0.4; cursor:default; transform:none; }
.ghost-btn { background:transparent; color:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.2); padding:0.75rem 1.5rem; border-radius:12px; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.9rem; cursor:pointer; width:100%; transition:background 0.15s; }
.ghost-btn:hover { background:rgba(255,255,255,0.1); }
.field { width:100%; padding:0.85rem 1rem; background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2); border-radius:12px; font-family:'Nunito',sans-serif; font-weight:700; font-size:1rem; color:#fff; outline:none; transition:border-color 0.2s; margin-bottom:0.75rem; }
.field::placeholder { color:rgba(255,255,255,0.3); }
.field:focus { border-color:var(--gold); }
.field-label { font-size:0.75rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; margin-bottom:0.4rem; display:block; }
.logo { font-family:'Nunito',sans-serif; font-weight:900; font-size:3rem; letter-spacing:-2px; }
.logo span { color:var(--gold); }
.logo-sub { font-size:0.78rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; margin-bottom:2rem; }
.card { background:var(--glass); border:1px solid var(--glass-b); border-radius:20px; padding:2rem; }
.divider { display:flex; align-items:center; gap:10px; margin:1rem 0; color:rgba(255,255,255,0.25); font-size:0.8rem; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.12); }
.room-code { font-family:'Nunito',sans-serif; font-weight:900; font-size:3.5rem; letter-spacing:8px; color:var(--gold); text-align:center; margin:0.5rem 0; }
.room-label { font-size:0.75rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; text-align:center; }
.players-grid { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:1.25rem 0; min-height:48px; }
.player-chip { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:999px; padding:6px 16px; font-size:0.85rem; font-family:'Nunito',sans-serif; font-weight:700; animation:fadeUp 0.25s ease; display:flex; align-items:center; gap:6px; }
.player-chip::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--gold); display:block; }
.topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem; flex-wrap:wrap; gap:6px; }
.q-counter { font-family:'Nunito',sans-serif; font-weight:900; font-size:0.8rem; color:rgba(255,255,255,0.45); text-transform:uppercase; letter-spacing:1px; }
.player-pill { background:rgba(255,255,255,0.1); border-radius:999px; padding:0.3rem 0.85rem; font-size:0.8rem; display:flex; align-items:center; gap:6px; }
.player-dot { width:7px; height:7px; border-radius:50%; background:var(--gold); flex-shrink:0; }
.score-pill { font-family:'Nunito',sans-serif; font-weight:900; font-size:0.85rem; }
.score-pill span { color:var(--gold); }
.timer-row { display:flex; align-items:center; gap:10px; margin-bottom:0.75rem; }
.timer-num { font-family:'Nunito',sans-serif; font-weight:900; font-size:1.6rem; min-width:38px; text-align:center; transition:color 0.3s; }
.timer-bar-bg { flex:1; height:8px; background:rgba(255,255,255,0.12); border-radius:99px; overflow:hidden; }
.timer-bar { height:8px; background:var(--gold); border-radius:99px; transition:width 0.1s linear,background 0.4s; }
.q-card { background:var(--glass); border:1px solid var(--glass-b); border-radius:16px; padding:1.5rem; text-align:center; margin-bottom:1.25rem; }
.q-img-wrap { width:200px; height:140px; margin:0 auto 1rem; border-radius:12px; border:2px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:center; overflow:hidden; padding:8px; }
.q-img-wrap svg { width:100%; height:100%; }
.q-text { font-family:'Nunito',sans-serif; font-weight:900; font-size:1.2rem; line-height:1.4; }
.options-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:1rem; }
.opt-btn { border:none; border-radius:12px; padding:1rem 0.75rem; cursor:pointer; display:flex; align-items:center; gap:10px; text-align:left; min-height:74px; font-family:'Nunito Sans',sans-serif; font-weight:600; font-size:0.9rem; color:#fff; transition:transform 0.12s,opacity 0.2s; }
.opt-btn:hover:not(:disabled) { transform:scale(1.03); }
.opt-btn:active:not(:disabled) { transform:scale(0.97); }
.opt-btn:disabled { cursor:default; }
.opt-0{background:var(--red);box-shadow:0 4px 0 var(--red-d);}
.opt-1{background:var(--blue);box-shadow:0 4px 0 var(--blue-d);}
.opt-2{background:var(--green);box-shadow:0 4px 0 var(--green-d);}
.opt-3{background:var(--orange);box-shadow:0 4px 0 var(--orange-d);}
.opt-icon { width:30px; height:30px; border-radius:7px; background:rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.opt-label { flex:1; line-height:1.3; }
.opt-btn.dim { opacity:0.28; transform:scale(0.97)!important; box-shadow:none; }
.opt-btn.correct-glow { outline:4px solid #fff; outline-offset:2px; animation:pulse 0.6s ease; }
.fb-box { border-radius:12px; padding:1rem 1.25rem; font-size:0.87rem; line-height:1.5; margin-bottom:0.9rem; animation:fadeUp 0.2s ease; }
.fb-box.ok   { background:rgba(26,170,110,0.2); border:1px solid rgba(26,170,110,0.5); }
.fb-box.fail { background:rgba(232,64,64,0.2);  border:1px solid rgba(232,64,64,0.5); }
.fb-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:1rem; margin-bottom:3px; }
.waiting-next { text-align:center; padding:1rem; background:var(--glass); border:1px solid var(--glass-b); border-radius:12px; font-size:0.88rem; color:rgba(255,255,255,0.5); }
.waiting-dot { display:inline-block; animation:pulse 1s infinite; }
.result-screen { text-align:center; padding:1.5rem; }
.podium { display:flex; align-items:flex-end; justify-content:center; gap:8px; margin:1.25rem 0 1.5rem; }
.podium-col { display:flex; flex-direction:column; align-items:center; gap:5px; }
.podium-name { font-family:'Nunito',sans-serif; font-weight:900; font-size:0.78rem; max-width:80px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.podium-score { font-size:0.68rem; color:rgba(255,255,255,0.45); }
.podium-block { width:70px; border-radius:8px 8px 0 0; display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
.p1{background:var(--gold);height:88px;}.p2{background:#c0c0c0;height:62px;}.p3{background:#cd7f32;height:46px;}
.lb-list { display:flex; flex-direction:column; gap:8px; margin-bottom:1.5rem; }
.lb-row { display:flex; align-items:center; gap:12px; background:var(--glass); border:1px solid var(--glass-b); border-radius:12px; padding:0.8rem 1rem; animation:fadeUp 0.3s ease both; }

.host-badge { display:inline-block; background:rgba(245,200,66,0.2); color:var(--gold); border:1px solid rgba(245,200,66,0.4); border-radius:999px; padding:3px 12px; font-size:0.72rem; font-family:'Nunito',sans-serif; font-weight:700; margin-bottom:1rem; }

    <line x1="100" y1="70" x2="100" y2="82" stroke="#f5c842" stroke-width="2"/>
    <polygon points="96,82 104,82 100,88" fill="#f5c842"/>
    <polygon points="100,88 140,104 100,120 60,104" fill="#e07b10" stroke="#fff" stroke-width="1.5"/>
    <text x="100" y="107" text-anchor="middle" font-size="8" fill="#fff" font-family="Arial">¿Terminó?</text>
    <line x1="140" y1="104" x2="165" y2="104" stroke="#1aaa6e" stroke-width="2"/>
    <text x="168" y="108" font-size="9" fill="#1aaa6e" font-family="Arial" font-weight="bold">SÍ</text>
    <line x1="100" y1="120" x2="100" y2="132" stroke="#e84040" stroke-width="2"/>
    <text x="104" y="132" font-size="9" fill="#e84040" font-family="Arial" font-weight="bold">NO</text>
    <text x="14" y="108" font-size="8" fill="rgba(255,255,255,0.4)" font-family="Arial">Inicio y fin</text>
    <text x="14" y="118" font-size="8" fill="rgba(255,255,255,0.4)" font-family="Arial">definidos</text>
  </svg>`
};

const QS = [
  { q:"¿Qué es una red informática?", img:"red", opts:["Un solo equipo conectado a internet","Un conjunto de dispositivos conectados para compartir recursos","Un programa para navegar en internet","Un tipo de cable de datos"], ans:1, exp:"Una red informática es un conjunto de dispositivos conectados entre sí para compartir recursos, información y servicios." },
  { q:"¿Cuál de estos es un tipo de cable usado en redes?", img:"utp", opts:["Cable HDMI","Cable USB","Cable de par trenzado (UTP)","Cable de audio"], ans:2, exp:"El cable UTP (Par Trenzado sin Apantallar) es el más usado en redes de área local por su bajo costo y facilidad de instalación." },
  { q:"¿Qué tipo de red cubre un área pequeña como una casa o salón de clases?", img:"lan", opts:["WAN","WLAN","LAN","Internet"], ans:2, exp:"LAN (Local Area Network) es una red de área local que cubre espacios pequeños como una casa, oficina o salón de clases." },
  { q:"¿Qué tipo de red permite conectar dispositivos de forma inalámbrica?", img:"wlan", opts:["LAN","WAN","WLAN","Cable UTP"], ans:2, exp:"WLAN (Wireless Local Area Network) es una red inalámbrica. El Wi-Fi es el ejemplo más común." },
  { q:"¿Qué tipo de red conecta países o continentes?", img:"wan", opts:["LAN","WLAN","Intranet","WAN"], ans:3, exp:"WAN (Wide Area Network) conecta ciudades, países e incluso continentes. Internet es el ejemplo más grande de WAN." },
  { q:"¿Cuál es el orden correcto de pasos de un algoritmo para hacer un sándwich?", img:"sandwich", opts:["Comer, untar, agarrar pan","Agarrar pan, untar ingredientes, cerrar y comer","Cerrar, agarrar pan, untar","Untar, comer, agarrar pan"], ans:1, exp:"Un algoritmo tiene pasos ordenados. El orden correcto es: agarrar pan → untar ingredientes → cerrar → comer." },
  { q:"¿Cuál es una característica obligatoria de todo algoritmo?", img:"algoritmo", opts:["Debe estar escrito en Python","Debe tener imágenes","Debe tener un inicio y un fin definidos","Debe ejecutarse en una computadora"], ans:2, exp:"Todo algoritmo debe tener un inicio y un fin claramente definidos, además de ser finito, preciso y ordenado." }
];

const ICONS=["◆","■","▲","●"], TIME=20;
let room="",name="",isHost=false,answered=false,localScore=0,timerID=null,roomListener=null;
const app=document.getElementById('app');

function lobby(){
  if(roomListener){db.ref('rooms/'+room).off();roomListener=null;}
  clearInterval(timerID); localScore=0; answered=false;
  app.innerHTML=`<div class="fade-up" style="text-align:center;padding:2rem 0">
    <div class="logo">Quiz<span>!</span></div>
    <div class="logo-sub">Introducción a las Ciencias de la Computación</div>
    <div class="card" style="max-width:360px;margin:0 auto">
      <label class="field-label">Tu nombre</label>
      <input class="field" id="nameI" placeholder="Ej: Luis García" maxlength="20" oninput="syncBtns()" onkeydown="if(event.key==='Enter')createRoom()">
      <button class="yellow-btn" id="createBtn" onclick="createRoom()" disabled>Crear sala (Host)</button>
      <div class="divider">o únete a una sala</div>
      <label class="field-label">Código de sala</label>
      <input class="field" id="roomI" placeholder="Ej: 4829" maxlength="4" oninput="syncBtns()" onkeydown="if(event.key==='Enter')joinRoom()">
      <button class="ghost-btn" id="joinBtn" onclick="joinRoom()" disabled>Unirse a sala existente</button>
    </div>
  </div>`;
}

function syncBtns(){
  const n=document.getElementById('nameI').value.trim(),r=document.getElementById('roomI').value.trim();
  document.getElementById('createBtn').disabled=n.length<2;
  document.getElementById('joinBtn').disabled=n.length<2||r.length<4;
}

function createRoom(){
  name=document.getElementById('nameI').value.trim();
  if(name.length<2)return;
  room=Math.floor(1000+Math.random()*9000).toString(); isHost=true;
  db.ref('rooms/'+room).set({q:0,started:false,players:{}})
    .then(()=>{db.ref('rooms/'+room+'/players/'+name).set({score:0});waitingRoom();});
}

function joinRoom(){
  name=document.getElementById('nameI').value.trim();
  room=document.getElementById('roomI').value.trim();
  if(name.length<2||room.length<4)return; isHost=false;
  db.ref('rooms/'+room).once('value').then(snap=>{
    if(!snap.val()){alert('Sala no encontrada. Verifica el código.');return;}
    db.ref('rooms/'+room+'/players/'+name).set({score:0}); waitingRoom();
  });
}

function waitingRoom(){
  app.innerHTML=`<div class="fade-up" style="text-align:center;padding:1.5rem 0">
    ${isHost?'<div class="host-badge">Eres el host</div>':''}
    <div class="room-label">Código de sala</div>
    <div class="room-code">${room}</div>
    <p style="font-size:0.82rem;color:rgba(255,255,255,0.4);margin-bottom:1.25rem">Comparte este código con tus compañeros</p>
    <div class="card" style="max-width:440px;margin:0 auto">
      <p style="font-size:0.75rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.75rem">Jugadores conectados</p>
      <div class="players-grid" id="pg"></div>
      ${isHost?`<button class="yellow-btn" id="startBtn" onclick="startGame()" disabled style="margin-top:0.5rem">Iniciar juego</button>`:`<div class="waiting-next"><span class="waiting-dot">⏳</span> Esperando que el host inicie...</div>`}
    </div>
  </div>`;
  if(roomListener)db.ref('rooms/'+room).off();
  roomListener=db.ref('rooms/'+room).on('value',snap=>{
    const data=snap.val(); if(!data)return;
    const names=Object.keys(data.players||{});
    const pg=document.getElementById('pg');
    if(pg)pg.innerHTML=names.map(n=>`<div class="player-chip">${n}</div>`).join('');
    const sb=document.getElementById('startBtn');
    if(sb)sb.disabled=names.length<1;
    if(data.started&&!isHost){db.ref('rooms/'+room).off();listenGame();}
  });
}

function startGame(){
  db.ref('rooms/'+room).update({started:true,q:0});
  db.ref('rooms/'+room).off(); listenGame();
}

function listenGame(){
  roomListener=db.ref('rooms/'+room).on('value',snap=>{
    const data=snap.val(); if(!data)return;
    if(data.q>=QS.length){db.ref('rooms/'+room).off();showResults(data.players);}
    else{renderQuestion(data);}
  });
}

let currentQ=-1;
function renderQuestion(data){
  if(data.q===currentQ)return;
  currentQ=data.q; answered=false; clearInterval(timerID);
  let timeLeft=TIME; const q=QS[data.q];
  app.innerHTML=`<div class="fade-up">
    <div class="topbar">
      <div class="q-counter">Pregunta ${data.q+1}/${QS.length}</div>
      <div class="player-pill"><div class="player-dot"></div>${name}</div>
      <div class="score-pill">Pts: <span id="sv">${localScore}</span></div>
    </div>
    <div class="timer-row">
      <div class="timer-num" id="tn">${TIME}</div>
      <div class="timer-bar-bg"><div class="timer-bar" id="tb" style="width:100%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-img-wrap">${IMGS[q.img]||''}</div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="options-grid">
      ${q.opts.map((o,i)=>`<button class="opt-btn opt-${i}" id="o${i}" onclick="answer(${i})"><span class="opt-icon">${ICONS[i]}</span><span class="opt-label">${o}</span></button>`).join('')}
    </div>
    <div id="fb"></div>
  </div>`;
  timerID=setInterval(()=>{
    timeLeft--;
    const bar=document.getElementById('tb'),num=document.getElementById('tn');
    if(bar){bar.style.width=Math.round((timeLeft/TIME)*100)+'%';if(timeLeft<=5)bar.style.background='#e84040';}
    if(num){num.textContent=timeLeft;num.style.color=timeLeft<=5?'#e84040':'#fff';}
    if(timeLeft<=0){clearInterval(timerID);if(!answered){answered=true;showFB(-1,q,0,true);}}
  },1000);
}

function answer(i){
  if(answered)return; answered=true; clearInterval(timerID);
  db.ref('rooms/'+room).once('value').then(snap=>{
    const data=snap.val(),q=QS[data.q],correct=i===q.ans,pts=correct?100:0;
    if(correct){localScore+=pts;db.ref('rooms/'+room+'/players/'+name+'/score').transaction(s=>(s||0)+pts);}
    showFB(i,q,pts,false);
    if(isHost)setTimeout(()=>nextQ(data.q),2500);
  });
}

function showFB(chosen,q,pts,timed){
  for(let i=0;i<4;i++){const b=document.getElementById('o'+i);if(!b)continue;b.disabled=true;if(i===q.ans)b.classList.add('correct-glow');else b.classList.add('dim');}
  const sv=document.getElementById('sv');if(sv)sv.textContent=localScore;
  const ok=chosen===q.ans;
  document.getElementById('fb').innerHTML=`<div class="fb-box ${ok?'ok':'fail'}">
    <div class="fb-title">${timed?'⏰ Tiempo agotado':ok?'✅ Correcto — +'+pts+' puntos':'❌ Incorrecto'}</div>
    ${q.exp||''}
  </div>${!isHost?`<div class="waiting-next"><span class="waiting-dot">⏳</span> Esperando al host...</div>`:''}`;
}

function nextQ(qIndex){db.ref('rooms/'+room+'/q').transaction(q=>q===qIndex?(q||0)+1:q);}

function showResults(players){
  clearInterval(timerID);
  const arr=Object.entries(players).sort((a,b)=>b[1].score-a[1].score);
  const maxPts=arr[0]?.[1]?.score||1;
  const rClass=i=>['gold','silver','bronze'][i]||'norm';
  const rIcon=i=>['🥇','🥈','🥉'][i]||(i+1);
  const barColor=i=>i===0?'var(--gold)':i===1?'#c0c0c0':i===2?'#cd7f32':'rgba(255,255,255,0.3)';
  let podium='';
  if(arr.length>=2){
    const top=arr.slice(0,Math.min(3,arr.length));
    const order=top.length>=3?[top[1],top[0],top[2]]:[top[1],top[0]];
    const cls=top.length>=3?['p2','p1','p3']:['p2','p1'];
    const mdls=top.length>=3?['🥈','🥇','🥉']:['🥈','🥇'];
    podium=`<div class="podium">${order.map((p,i)=>`<div class="podium-col"><div class="podium-name">${p[0]}</div><div class="podium-score">${p[1].score} pts</div><div class="podium-block ${cls[i]}">${mdls[i]}</div></div>`).join('')}</div>`;
  }
  const rows=arr.map(([n,p],i)=>`<div class="lb-row${n===name?' hl':''}" style="animation-delay:${i*0.04}s">
    <div class="lb-rank ${rClass(i)}">${rIcon(i)}</div>
    <div class="lb-name">${n}${n===name?'<span class="lb-you">tú</span>':''}</div>
    <div class="lb-bar-wrap"><div class="lb-bar" style="width:${Math.round((p.score/maxPts)*100)}%;background:${barColor(i)}"></div></div>
    <div class="lb-pts">${p.score}</div>
  </div>`).join('');
  app.innerHTML=`<div class="result-screen fade-up">
    <div class="logo" style="font-size:2rem">Ranking Final</div>
    ${podium}
    <div class="lb-list">${rows}</div>
    <button class="yellow-btn" style="max-width:300px;margin:0 auto" onclick="lobby()">Volver al inicio</button>
  </div>`;
}

lobby();
</script>
</body>
</html>
