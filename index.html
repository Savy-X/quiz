<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz - ICC</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#1a0e3d;color:white;text-align:center}
h1{margin:10px}
.btn{background:#f5c842;padding:10px 20px;border:none;border-radius:20px;margin:5px;font-weight:bold}
.opt{display:block;margin:10px auto;padding:15px;width:80%;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
.correct{background:#1aaa6e}
.wrong{background:#e84040}
img{width:200px;margin:10px}
.timer{font-size:22px;margin:10px}
</style>
</head>

<body>
<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCw6dFeA209MD3oaoW5R_mN__537fL2AwA",
  authDomain: "quiz-icc.firebaseapp.com",
  databaseURL: "https://quiz-icc-default-rtdb.firebaseio.com",
  projectId: "quiz-icc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const QS = [
{
q:"¿Qué es un algoritmo?",
img:"https://upload.wikimedia.org/wikipedia/commons/3/3b/Algorithm.png",
opts:["Lenguaje","Pasos para resolver","Hardware","SO"],
ans:1
},
{
q:"Sistema binario",
img:"https://upload.wikimedia.org/wikipedia/commons/7/7c/Binary_code.svg",
opts:["0-1","1","0-1-2","ABC"],
ans:0
}
];

let room="", name="", isHost=false, answered=false;

const app=document.getElementById('app');

function lobby(){
app.innerHTML=`
<h1>Introducción a las Ciencias Computacionales</h1>
<input id="name" placeholder="Tu nombre"><br>
<button class="btn" onclick="createRoom()">Crear sala</button><br>
<input id="room" placeholder="Código">
<button class="btn" onclick="joinRoom()">Unirse</button>
`;
}

function createRoom(){
name=document.getElementById('name').value;
room=Math.floor(1000+Math.random()*9000).toString();
isHost=true;

db.ref('rooms/'+room).set({q:0,time:10,players:{}});
joinRoom();
}

function joinRoom(){
name=document.getElementById('name').value;
room=document.getElementById('room').value || room;

db.ref('rooms/'+room+'/players/'+name).set({score:0});

listenRoom();
}

function listenRoom(){
db.ref('rooms/'+room).on('value',snap=>{
let data=snap.val();
if(!data) return;

if(data.q>=QS.length){
showResults(data.players);
}else{
showQ(data);
}
});
}

function showQ(data){
answered=false;
let q=QS[data.q];

app.innerHTML=`
<h1>Sala ${room}</h1>
<div class="timer">Tiempo: ${data.time}</div>
<img src="${q.img}">
<h2>${q.q}</h2>
${q.opts.map((o,i)=>`<button class="opt" onclick="answer(${i})" id="o${i}">${o}</button>`).join('')}
`;
}

function answer(i){
if(answered) return;
answered=true;

db.ref('rooms/'+room).once('value').then(snap=>{
let data=snap.val();
let correct = i===QS[data.q].ans;

if(correct){
document.getElementById('o'+i).classList.add('correct');
db.ref('rooms/'+room+'/players/'+name+'/score')
.transaction(s=> (s||0)+1);
alert("Correcto ✅");
}else{
document.getElementById('o'+i).classList.add('wrong');
alert("Incorrecto ❌");
}

if(isHost){
setTimeout(nextQ,2000);
}
});
}

function nextQ(){
db.ref('rooms/'+room+'/q').transaction(q=> (q||0)+1);
}

function showResults(players){
let arr=Object.entries(players).sort((a,b)=>b[1].score-a[1].score);

app.innerHTML=`
<h1>Ranking Final</h1>
${arr.map((p,i)=>`<p>${i+1}. ${p[0]} - ${p[1].score}</p>`).join('')}
<button class="btn" onclick="lobby()">Reiniciar</button>
`;
}

lobby();
</script>
</body>
</html>
</script>

</body>
</html>
