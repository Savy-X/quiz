<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz ICC </title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
  font-family:Arial;
  background: linear-gradient(135deg,#1a0e3d,#3b1f7a);
  color:white;
  margin:0;
}

.btn{
  background:#f5c842;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
  background:#ffd84d;
}

.opt{display:inline-block;width:45%;margin:10px;padding:20px;border:none;border-radius:12px;font-weight:bold;font-size:16px;cursor:pointer}
.opt0{background:#e84040}
.opt1{background:#1468c8}
.opt2{background:#1aaa6e}
.opt3{background:#e07b10}

.correct{outline:4px solid white}
.wrong{opacity:0.3}

.timer{font-size:22px;margin:10px}
img{width:200px;margin:10px;border-radius:10px}

.fade{animation:fade 0.3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
</head>

<body>
<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCw6dFeA209MD3oaoW5R_mN__537fL2AwA",
  authDomain: "quiz-icc.firebaseapp.com",
  databaseURL: "https://quiz-icc-default-rtdb.firebaseio.com",
  projectId: "quiz-icc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const QS = [
{
q:"¿Qué es un algoritmo?",
img:"https://upload.wikimedia.org/wikipedia/commons/3/3b/Algorithm.png",
opts:["Lenguaje","Pasos para resolver","Hardware","SO"],
ans:1
},
{
q:"Sistema binario",
img:"https://upload.wikimedia.org/wikipedia/commons/7/7c/Binary_code.svg",
opts:["0-1","1","0-1-2","ABC"],
ans:0
}
];

let room="", name="", isHost=false, answered=false;

const app=document.getElementById('app');

function lobby(){
app.innerHTML = `
<div style="display:flex;justify-content:center;align-items:center;height:100vh;">

  <div style="text-align:center;">
  
    <h1 style="font-size:36px;margin-bottom:20px;">
    Introducción a las Ciencias Computacionales
    </h1>

    <div style="background:#2a1a5e;padding:30px;border-radius:20px;width:300px;">
      
      <input id="name" placeholder="Tu nombre" style="width:100%;padding:12px;margin-bottom:15px;border-radius:10px;border:none;">
      
      <button class="btn" onclick="createRoom()" style="width:100%;margin-bottom:10px;">
      Crear sala
      </button>

      <input id="room" placeholder="Código de sala" style="width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;">
      
      <button class="btn" onclick="joinRoom()" style="width:100%;">
      Unirse
      </button>

    </div>

  </div>

</div>
`;
}


function startTimer(){
let t=15;
let interval=setInterval(()=>{
t--;
document.querySelector('.timer').innerText="Tiempo: "+t;

if(t<=0){
clearInterval(interval);
if(isHost) nextQ();
}
},1000);
}

function answer(i){
if(answered) return;
answered=true;

db.ref('rooms/'+room).once('value').then(snap=>{
let data=snap.val();

if(i===QS[data.q].ans){
document.getElementById('o'+i).classList.add('correct');
alert("Correcto ✅");

db.ref('rooms/'+room+'/players/'+name+'/score')
.transaction(s=> (s||0)+1);

}else{
document.getElementById('o'+i).classList.add('wrong');
alert("Incorrecto ❌");
}

if(isHost){
setTimeout(nextQ,2000);
}
});
}

function nextQ(){
db.ref('rooms/'+room+'/q').transaction(q=> (q||0)+1);
}

function showResults(players){
let arr=Object.entries(players).sort((a,b)=>b[1].score-a[1].score);

app.innerHTML=`
<h1>🏆 Ranking Final</h1>
${arr.map((p,i)=>`<p>${i+1}. ${p[0]} - ${p[1].score}</p>`).join('')}
<button class="btn" onclick="lobby()">Reiniciar</button>
`;
}

lobby();
</script>

</body>
</html>
